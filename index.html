<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Actually Though">
<meta name="theme-color" content="#7c5cbf">
<title>Actually Though 💭</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,input,textarea,select{font-family:inherit;-webkit-appearance:none;appearance:none}
:root{
  --pur:#7c5cbf;--pur2:#9b7dd4;--purL:#2a1f4a;
  --teal:#12a37a;--teal2:#0d7a5c;--tealL:#082d1c;
  --gold:#c9973a;--goldL:#3a2a0a;
  --red:#c0392b;--redL:#2a0a0a;
  --bg:#0d0f1a;--bg2:#12141f;--bg3:#1a1d2e;--bg4:#20233a;
  --tx:#e8e6f0;--tx2:#a8a4c0;--tx3:#5a5870;
  --bd:rgba(124,92,191,.15);--bd2:rgba(255,255,255,.06);
  --card:#12141f;--nav:#0d0f1a;
}
[data-theme="light"]{
  --bg:#f4f2fc;--bg2:#fff;--bg3:#ede9f8;--bg4:#e4dff5;
  --tx:#1a1730;--tx2:#4a4670;--tx3:#9090b0;
  --bd:rgba(124,92,191,.2);--bd2:rgba(0,0,0,.06);
  --card:#fff;--nav:#f4f2fc;--purL:#ede9f8;--tealL:#e1f5ee;--redL:#fde8e8;
}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body{padding-bottom:4rem}
.hdr{padding:.85rem 1rem .75rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--bg);position:sticky;top:0;z-index:200}
.hdr-brand{font-family:'DM Serif Display',serif;font-size:17px;color:var(--pur2)}
.hdr-brand em{color:var(--gold);font-style:italic}
.theme-btn{background:var(--bg3);border:none;border-radius:20px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--tx2)}
.nav-wrap{position:sticky;top:49px;z-index:100;background:var(--nav);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none}
.nav-wrap::-webkit-scrollbar{display:none}
.nav-inner{display:flex;gap:4px;padding:.4rem .75rem;width:max-content}
.pill{font-size:11.5px;padding:5px 14px;border:1px solid var(--bd2);border-radius:100px;background:var(--bg3);cursor:pointer;color:var(--tx2);white-space:nowrap;font-weight:500;transition:all .12s}
.pill.active{background:var(--pur);color:#fff;border-color:var(--pur);font-weight:600}
.sec{padding:.75rem 1rem 3rem;display:none}
.sec.active{display:block}
.sec-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;padding:.6rem 0 .4rem}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.6rem}

/* DEBATE SCREEN */
.proposition-box{background:linear-gradient(135deg,#100f20,#0d1530);border:1px solid var(--bd);border-radius:20px;padding:1.25rem;margin:.5rem 0 .85rem;text-align:center}
.prop-label{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.prop-text{font-family:'DM Serif Display',serif;font-size:20px;color:var(--tx);line-height:1.4;letter-spacing:-.2px}
.prop-cat{font-size:11px;color:var(--pur2);margin-top:.4rem;font-weight:500}

.field{width:100%;border:1.5px solid var(--bd2);border-radius:10px;padding:.6rem .8rem;font-size:14px;background:var(--bg3);color:var(--tx);margin-bottom:.5rem;resize:vertical;outline:none;transition:border .15s;font-family:'DM Sans',sans-serif}
.field:focus{border-color:var(--pur)}
.field-lbl{font-size:11px;color:var(--tx3);margin-bottom:.25rem;font-weight:500;display:block}

.btn{width:100%;padding:12px;background:var(--pur);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;transition:opacity .12s;font-family:'DM Sans',sans-serif}
.btn:active{opacity:.82}
.btn.sec-btn{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd2)}
.btn.teal{background:var(--teal)}
.btn-row{display:flex;gap:.5rem;margin-bottom:.65rem}
.btn-row .btn{flex:1}

/* TOPIC CHIPS */
.cat-row{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.5rem}
.cat-chip{font-size:11px;padding:4px 11px;border:1.5px solid var(--bd2);border-radius:20px;cursor:pointer;background:var(--bg3);color:var(--tx3);transition:all .12s;font-weight:500}
.cat-chip.active{border-color:var(--pur);color:var(--pur2);background:var(--purL)}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.65rem}
.topic-btn{padding:.65rem .75rem;border:1.5px solid var(--bd2);border-radius:12px;background:var(--bg3);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;text-align:left;line-height:1.4}
.topic-btn:active{border-color:var(--pur);background:var(--purL)}

/* DEBATE ARENA */
.arena{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.5rem 0}
.side{border-radius:16px;padding:.85rem;border:1.5px solid var(--bd2)}
.side.pro{border-color:rgba(18,163,122,.3);background:rgba(18,163,122,.05)}
.side.con{border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.05)}
.side-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.side.pro .side-hdr{color:var(--teal)}
.side.con .side-hdr{color:#e06050}
.side-content{font-size:12px;color:var(--tx2);line-height:1.65;min-height:80px}
.side-content.loading{color:var(--tx3);font-style:italic}

.steelman-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:10px;font-weight:700;color:var(--gold);background:var(--goldL);border:1px solid rgba(201,151,58,.3);border-radius:20px;padding:3px 10px;margin-bottom:.5rem}

.your-take{margin:.65rem 0}
.rating-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;margin:.5rem 0}
.rate-btn{padding:.6rem .3rem;border:1.5px solid var(--bd2);border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--tx2);text-align:center;transition:all .12s;font-family:'DM Sans',sans-serif}
.rate-btn.pro-wins{border-color:rgba(18,163,122,.4);color:var(--teal)}
.rate-btn.pro-wins:hover{background:var(--tealL)}
.rate-btn.tie{border-color:rgba(201,151,58,.4);color:var(--gold)}
.rate-btn.con-wins{border-color:rgba(192,57,43,.4);color:#e06050}
.rate-btn.con-wins:hover{background:var(--redL)}

/* HISTORY */
.debate-entry{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:.85rem 1rem;margin-bottom:.5rem;cursor:pointer}
.de-prop{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:.3rem;line-height:1.4}
.de-meta{font-size:11px;color:var(--tx3)}
.de-verdict{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;display:inline-block;margin-top:.3rem}
.de-verdict.pro{background:rgba(18,163,122,.15);color:var(--teal)}
.de-verdict.con{background:rgba(192,57,43,.15);color:#e06050}
.de-verdict.tie{background:var(--goldL);color:var(--gold)}

/* LOADING */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--bd2);border-top-color:var(--pur2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.35rem}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--pur);border-radius:20px;padding:.5rem 1.1rem;font-size:13px;color:var(--tx);z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">Actually Though <em>💭</em></div>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
</div>

<div class="nav-wrap">
  <div class="nav-inner">
    <button class="pill active" onclick="showSec('debate')">⚔️ Debate</button>
    <button class="pill" onclick="showSec('topics')">🗂 Topics</button>
    <button class="pill" onclick="showSec('history')">📜 History</button>
  </div>
</div>

<!-- ══════════════════ DEBATE ══════════════════ -->
<div class="sec active" id="sec-debate">

  <div class="proposition-box" id="prop-box">
    <div class="prop-label">Current proposition</div>
    <div class="prop-text" id="prop-display">Choose a topic or enter your own below</div>
    <div class="prop-cat" id="prop-cat"></div>
  </div>

  <div class="sec-lbl">Your own proposition</div>
  <textarea class="field" id="custom-prop" rows="2" placeholder="e.g. Suffering is necessary for genuine compassion..."></textarea>
  <div class="btn-row">
    <button class="btn" onclick="startDebate('custom')">⚔️ Debate This</button>
    <button class="btn sec-btn" onclick="steelmanMode()">🔥 Steelman Mode</button>
  </div>

  <div id="steelman-notice" style="display:none" class="steelman-badge">🔥 Steelman Mode — Claude will argue your weakest side extra hard</div>

  <!-- ARENA -->
  <div id="arena-wrap" style="display:none">
    <div class="sec-lbl">The Arena</div>
    <div class="arena">
      <div class="side pro">
        <div class="side-hdr">✅ For</div>
        <div class="side-content loading" id="pro-content"><span class="spinner"></span>Thinking...</div>
      </div>
      <div class="side con">
        <div class="side-hdr">❌ Against</div>
        <div class="side-content loading" id="con-content"><span class="spinner"></span>Thinking...</div>
      </div>
    </div>

    <div class="your-take">
      <div class="sec-lbl">Your take</div>
      <textarea class="field" id="user-take" rows="2" placeholder="Add your own argument or reflection..."></textarea>
      <div class="sec-lbl">Who won the argument?</div>
      <div class="rating-row">
        <button class="rate-btn pro-wins" onclick="rateDebate('pro')">✅ For wins</button>
        <button class="rate-btn tie" onclick="rateDebate('tie')">🤝 Tie</button>
        <button class="rate-btn con-wins" onclick="rateDebate('con')">❌ Against wins</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ TOPICS ══════════════════ -->
<div class="sec" id="sec-topics">
  <div class="sec-lbl">Browse by category</div>
  <div class="cat-row" id="cat-row"></div>
  <div class="topic-grid" id="topic-grid"></div>
  <div class="btn-row" style="margin-top:.35rem">
    <button class="btn teal" onclick="surpriseMe()">🎲 Surprise Me</button>
    <button class="btn sec-btn" onclick="generateTopics()"><span id="gen-spinner" style="display:none" class="spinner"></span>✨ Generate New</button>
  </div>
</div>

<!-- ══════════════════ HISTORY ══════════════════ -->
<div class="sec" id="sec-history">
  <div class="sec-lbl">Past debates</div>
  <div id="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
var DB = {debates:[]};
function save(){localStorage.setItem('at-db',JSON.stringify(DB));}
function load(){var d=localStorage.getItem('at-db');if(d)DB=JSON.parse(d);}

var TOPICS = {
  'TCM Theory':[
    'The Heart, not the Kidney, is the root of the Shen',
    'Acupuncture works primarily through placebo mechanisms',
    'TCM diagnosis is more accurate than biomedical diagnosis for chronic conditions',
    'The Five Elements framework is clinically useful, not just poetic',
    'Moxibustion is underutilized in modern TCM practice',
    'Pattern diagnosis should always supersede disease diagnosis in TCM',
    'The Liver is the most important organ for mental health in TCM',
    'Constitutional medicine (Sasang) is superior to symptomatic treatment',
  ],
  'Clinical Ethics':[
    'Practitioners should decline to treat patients whose lifestyle contradicts their treatment',
    'TCM practitioners have an obligation to refer to biomedical doctors',
    'Patient autonomy should override clinical recommendation',
    'Placebo-informed treatment is ethical if it helps the patient',
    'Practitioners should disclose their own health struggles to patients',
    'Charging high fees for TCM services is ethically justifiable',
    'Treating family members creates unavoidable ethical problems',
    'Practitioners must maintain strict emotional boundaries with patients',
  ],
  'Philosophy':[
    'Suffering is necessary for genuine compassion',
    'Free will is compatible with determinism',
    'Ambition is incompatible with equanimity',
    'Happiness is a practice, not a destination',
    'The examined life is not always worth living',
    'Discipline is a form of self-love',
    'Identity is constructed, not discovered',
    'Solitude is essential for wisdom',
  ],
  'Medicine & Society':[
    'TCM should be covered by health insurance',
    'Integrative medicine dilutes both traditions it combines',
    'Social media has made people less healthy overall',
    'The biomedical model is fundamentally flawed',
    'Preventive medicine should be prioritized over treatment',
    'Mental health and physical health cannot be meaningfully separated',
    'Diet is more powerful than any medicine',
    'The Western medical system causes more harm than it prevents',
  ],
  'Personal Growth':[
    'Radical honesty does more harm than good in relationships',
    'Forgiveness is always in the forgiver\'s best interest',
    'Comfort zones should be regularly challenged',
    'Consistency matters more than intensity',
    'Self-awareness without action is indulgence',
    'Vulnerability is strength, not weakness',
    'People rarely change their core character',
    'Gratitude practice is genuinely transformative',
  ],
  'TCM & Modern Life':[
    'Screen time is the primary cause of modern Shen disturbance',
    'Urban living is fundamentally incompatible with good Qi cultivation',
    'Intermittent fasting aligns with TCM dietary principles',
    'Cold exposure (ice baths) conflicts with TCM cold-injury theory',
    'Caffeine is incompatible with serious TCM practice',
    'Modern stress is primarily a Liver Qi Stagnation epidemic',
    'Sleep deprivation is the greatest threat to Jing in modern life',
    'Plant-based diet is most aligned with TCM dietary theory',
  ],
};

var currentProp = '';
var currentCat = '';
var isSteelman = false;
var selectedCat = 'TCM Theory';
var proText = '';
var conText = '';
var debateActive = false;

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function showSec(id){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active')});
  document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active')});
  document.getElementById('sec-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id==='topics') renderTopics();
  if(id==='history') renderHistory();
}
function toggleTheme(){
  var t=document.documentElement.getAttribute('data-theme');
  var n=t==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  document.getElementById('theme-btn').textContent=n==='dark'?'☀️':'🌙';
  localStorage.setItem('at-theme',n);
}
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2400);
}

// ═══════════════════════════════════════
// TOPICS
// ═══════════════════════════════════════
function renderTopics(){
  var cats=Object.keys(TOPICS);
  var cr=document.getElementById('cat-row');
  cr.innerHTML=cats.map(function(c){
    return '<button class="cat-chip'+(c===selectedCat?' active':'')+'" onclick="selectCat(\''+c.replace(/'/g,"\\'")+'\'">'+c+'</button>';
  }).join('');
  renderTopicGrid();
}

function selectCat(cat){
  selectedCat=cat;
  document.querySelectorAll('.cat-chip').forEach(function(b){
    b.classList.toggle('active',b.textContent===cat);
  });
  renderTopicGrid();
}

function renderTopicGrid(){
  var topics=TOPICS[selectedCat]||[];
  document.getElementById('topic-grid').innerHTML=topics.map(function(t){
    return '<button class="topic-btn" onclick="selectTopic(\''+t.replace(/'/g,"\\'")+'\')">'+'<span style="font-size:10px;color:var(--pur2);display:block;margin-bottom:.2rem">'+selectedCat+'</span>'+t+'</button>';
  }).join('');
}

function selectTopic(t){
  currentProp=t;
  currentCat=selectedCat;
  document.getElementById('prop-display').textContent=t;
  document.getElementById('prop-cat').textContent=selectedCat;
  document.getElementById('custom-prop').value='';
  showSec('debate');
  document.querySelectorAll('.pill')[0].classList.add('active');
  document.querySelectorAll('.pill').forEach(function(p,i){if(i>0)p.classList.remove('active')});
  toast('Topic selected — hit Debate to begin');
}

function surpriseMe(){
  var cats=Object.keys(TOPICS);
  var cat=cats[Math.floor(Math.random()*cats.length)];
  var topics=TOPICS[cat];
  var t=topics[Math.floor(Math.random()*topics.length)];
  selectTopic(t);
  currentCat=cat;
}

async function generateTopics(){
  var spinner=document.getElementById('gen-spinner');
  spinner.style.display='inline-block';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:'Generate 6 fresh, thought-provoking debate propositions in the category "'+selectedCat+'". Each should be a clear, debatable statement — not a question. Return ONLY a JSON array of 6 strings, no markdown, no preamble.'}]
      })
    });
    var data=await resp.json();
    var text=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    var newTopics=JSON.parse(text);
    TOPICS[selectedCat]=(TOPICS[selectedCat]||[]).concat(newTopics);
    renderTopicGrid();
    toast('6 new topics added ✓');
  }catch(e){toast('Generation failed — check connection');}
  spinner.style.display='none';
}

// ═══════════════════════════════════════
// DEBATE
// ═══════════════════════════════════════
function steelmanMode(){
  isSteelman=!isSteelman;
  document.getElementById('steelman-notice').style.display=isSteelman?'inline-flex':'none';
  var btn=document.querySelector('.btn.sec-btn');
  if(btn) btn.style.borderColor=isSteelman?'var(--gold)':'';
  toast(isSteelman?'🔥 Steelman mode ON':'Steelman mode off');
}

async function startDebate(source){
  var prop=source==='custom'
    ?document.getElementById('custom-prop').value.trim()
    :currentProp;
  if(!prop){toast('Enter or select a proposition first');return;}
  currentProp=prop;
  document.getElementById('prop-display').textContent=prop;
  if(currentCat) document.getElementById('prop-cat').textContent=currentCat;

  // show arena
  document.getElementById('arena-wrap').style.display='block';
  document.getElementById('pro-content').innerHTML='<span class="spinner"></span>Thinking...';
  document.getElementById('pro-content').className='side-content loading';
  document.getElementById('con-content').innerHTML='<span class="spinner"></span>Thinking...';
  document.getElementById('con-content').className='side-content loading';
  document.getElementById('user-take').value='';
  debateActive=true;

  var steelNote=isSteelman?'\n\nIMPORTANT: This is Steelman Mode. The user wants to strengthen their critical thinking. Make the AGAINST argument especially rigorous, detailed, and hard to dismiss — find the strongest possible objections even if counterintuitive.':'';

  var systemPrompt='You are a rigorous intellectual debate engine. You argue both sides of any proposition with equal force, intellectual honesty, and depth. Draw on philosophy, TCM theory, clinical ethics, science, and lived wisdom as appropriate. Be specific, not generic. Each argument should have 3-4 distinct points. Format each side as flowing prose, not bullet points.'+steelNote;

  var userPrompt='Proposition: "'+prop+'"\n\nProvide two arguments:\n1. FOR the proposition (label: FOR)\n2. AGAINST the proposition (label: AGAINST)\n\nReturn ONLY a JSON object with keys "for" and "against", each containing the argument as a string. No markdown, no preamble.';

  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:systemPrompt,
        messages:[{role:'user',content:userPrompt}]
      })
    });
    var data=await resp.json();
    var text=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    var result=JSON.parse(text);
    proText=result.for||'';
    conText=result.against||'';
    document.getElementById('pro-content').textContent=proText;
    document.getElementById('pro-content').className='side-content';
    document.getElementById('con-content').textContent=conText;
    document.getElementById('con-content').className='side-content';
  }catch(e){
    document.getElementById('pro-content').textContent='API error — check connection.';
    document.getElementById('con-content').textContent='API error — check connection.';
    document.getElementById('pro-content').className='side-content';
    document.getElementById('con-content').className='side-content';
  }
}

function rateDebate(verdict){
  if(!debateActive||!currentProp){toast('Start a debate first');return;}
  var entry={
    date:new Date().toISOString().slice(0,10),
    time:new Date().toTimeString().slice(0,5),
    proposition:currentProp,
    category:currentCat,
    pro:proText,
    con:conText,
    userTake:document.getElementById('user-take').value.trim(),
    verdict:verdict,
    steelman:isSteelman,
  };
  DB.debates.unshift(entry);
  save();
  debateActive=false;
  var labels={pro:'✅ For wins',tie:'🤝 Tie',con:'❌ Against wins'};
  toast('Debate saved — '+labels[verdict]);
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function renderHistory(){
  var el=document.getElementById('history-list');
  if(!DB.debates.length){
    el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--tx3);font-size:13px">No debates yet. Start your first argument.</div>';
    return;
  }
  el.innerHTML=DB.debates.map(function(d,i){
    var vLabels={pro:'✅ For won',tie:'🤝 Tie',con:'❌ Against won'};
    var vClass={pro:'pro',tie:'tie',con:'con'};
    var dateStr=new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return '<div class="debate-entry" onclick="expandDebate('+i+')">'
      +'<div class="de-prop">'+d.proposition+'</div>'
      +'<div class="de-meta">'+(d.category||'Custom')+' · '+dateStr+(d.steelman?' · 🔥 Steelman':'')+'</div>'
      +'<span class="de-verdict '+vClass[d.verdict]+'">'+vLabels[d.verdict]+'</span>'
      +'</div>';
  }).join('');
}

function expandDebate(i){
  var d=DB.debates[i];
  if(!d) return;
  currentProp=d.proposition;
  currentCat=d.category;
  proText=d.pro;
  conText=d.con;
  document.getElementById('prop-display').textContent=d.proposition;
  document.getElementById('prop-cat').textContent=d.category||'';
  document.getElementById('pro-content').textContent=d.pro;
  document.getElementById('pro-content').className='side-content';
  document.getElementById('con-content').textContent=d.con;
  document.getElementById('con-content').className='side-content';
  document.getElementById('user-take').value=d.userTake||'';
  document.getElementById('arena-wrap').style.display='block';
  showSec('debate');
  document.querySelectorAll('.pill')[0].classList.add('active');
  document.querySelectorAll('.pill').forEach(function(p,i){if(i>0)p.classList.remove('active')});
  window.scrollTo(0,0);
}
